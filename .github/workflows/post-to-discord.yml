name: Post Lucky Puppy to Discord

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Lucky Puppy poster
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URLS: ${{ secrets.DISCORD_WEBHOOK_URLS }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          POST_TO_ALL_CHANNELS: ${{ secrets.POST_TO_ALL_CHANNELS }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python post.py

      - name: Commit next quote index
        if: always()
        run: |
          if [ -f next_index.txt ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add next_index.txt
            git commit -m "Update Lucky Puppy quote index" || echo "Nothing to commit"
            git push
          fi







          
